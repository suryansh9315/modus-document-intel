# Golden Q&A pairs for evaluating the modus-doc-intel system
# against the ICICI Bank Annual Report.
#
# Format:
#   query_type: one of the 7 QueryType values
#   question: the user question
#   expected_keywords: list of terms that MUST appear in the answer (case-insensitive substring match).
#                      Keywords are chosen to test content correctness, not response format artifacts.
#   section_ids: optional list of section IDs — document-specific (see doc_id below)
#   notes: grading notes for human review
#
# Active document: ffc96dd8-ec7a-4f4a-b846-8cfbf9fefadb (ICICI Bank Report.pdf, 341 pages)
# Section IDs below are specific to this document ingestion run.

golden_questions:
  # ─────────────────────────────────────────────────────────────────
  # SUMMARIZE_FULL — 4 questions
  # Tests that the system synthesises the whole document correctly.
  # ─────────────────────────────────────────────────────────────────
  - id: gq001
    query_type: SUMMARIZE_FULL
    question: "Provide a comprehensive executive summary of the ICICI Bank Annual Report."
    expected_keywords:
      - profit
      - NPA
      - growth
      - net interest
    notes: >
      A genuine executive summary of an Indian bank annual report MUST mention:
      net profit (profit), asset quality (NPA / GNPA), performance trajectory
      (growth), and interest income dynamics (net interest). 'ICICI' omitted —
      trivially present in any response about this document.

  - id: gq002
    query_type: SUMMARIZE_FULL
    question: "What are the major strategic priorities and business segments of ICICI Bank?"
    expected_keywords:
      - retail
      - digital
      - corporate
      - customer
    notes: >
      The four keywords map to four distinct segments / themes the report
      addresses: retail banking, digital strategy, corporate/SME banking, and
      customer-centricity. 'growth' removed (too generic for a segment question).

  - id: gq003
    query_type: SUMMARIZE_FULL
    question: "How did ICICI Bank perform financially in FY2024 compared to FY2023?"
    expected_keywords:
      - profit
      - income
      - growth
      - FY2024
    notes: >
      A year-on-year comparison must name the year (FY2024), discuss both
      income-statement lines (income, profit) and direction of change (growth).
      'deposit' replaced by 'FY2024' — deposit is a balance-sheet item; FY2024
      ensures temporal comparison is actually present.

  - id: gq004
    query_type: SUMMARIZE_FULL
    question: "What is the overall risk profile of ICICI Bank as described in the annual report?"
    expected_keywords:
      - credit
      - risk
      - NPA
      - operational
    notes: >
      A complete risk-profile summary must cover the three canonical Basel risk
      types: credit (credit / NPA), operational (operational risk), and ideally
      market risk. 'management' removed (generic noun that proves nothing).

  # ─────────────────────────────────────────────────────────────────
  # SUMMARIZE_SECTION — 4 questions
  # Section IDs are specific to doc ffc96dd8-ec7a-4f4a-b846-8cfbf9fefadb.
  # ─────────────────────────────────────────────────────────────────
  - id: gq005
    query_type: SUMMARIZE_SECTION
    question: "Summarize the Risk Management section of the annual report."
    section_ids:
      - "bc1911d6-a855-4162-b959-ce0003c91379"   # RISK GOVERNANCE FRAMEWORK pp.38-41
    expected_keywords:
      - risk
      - credit
      - framework
      - governance
    notes: >
      The RISK GOVERNANCE FRAMEWORK section (pp.38-41) explicitly discusses a
      risk governance framework covering credit risk. All four keywords are
      content requirements, not format checks.

  - id: gq006
    query_type: SUMMARIZE_SECTION
    question: "What does the MD&A section say about the bank's financial performance?"
    section_ids:
      - "aca7bba1-7580-4fc1-af22-ad0f36daed33"   # MANAGEMENT DISCUSSION & ANALYSIS pp.141-168
    expected_keywords:
      - profit
      - NPA
      - income
      - growth
    notes: >
      The full MD&A (pp.141-168) covers profit, asset quality (NPA), net
      interest income (income), and business growth. These are standard MD&A
      disclosures that must appear in any faithful summary.

  - id: gq007
    query_type: SUMMARIZE_SECTION
    question: "Summarize the financial highlights from the introduction section."
    section_ids:
      - "ccd85933-1164-453b-95e8-b305f6e2bf8b"   # Introduction / BANK AT A GLANCE pp.0-6
    expected_keywords:
      - profit
      - net interest
      - income
    notes: >
      The 'Bank at a Glance' section leads with key financial KPIs: net profit
      and net interest margin / income. 'growth' removed — the intro page may
      present absolute numbers; 'net interest' is a specific and verifiable
      term that must appear if NIM is discussed.

  - id: gq008
    query_type: SUMMARIZE_SECTION
    question: "What does the Chairman's message say about the bank's strategy?"
    section_ids:
      - "87a7866a-6a2a-4c17-8e8f-4cb4110ac75e"   # MESSAGE FROM THE CHAIRMAN pp.7-8
    expected_keywords:
      - strategy
      - growth
      - customer
    notes: >
      Chairman letters in ICICI reports consistently discuss strategy, customer
      focus, and growth narrative. 'bank' removed (trivially present in every
      response); 'customer' used as singular so it matches 'customer-centricity',
      'customer focus', and 'customers' alike (substring match).

  # ─────────────────────────────────────────────────────────────────
  # CROSS_SECTION_COMPARE — 3 questions
  # ─────────────────────────────────────────────────────────────────
  - id: gq009
    query_type: CROSS_SECTION_COMPARE
    question: "Compare what the Risk Management section and the MD&A say about Non-Performing Assets (NPA)."
    section_ids:
      - "bc1911d6-a855-4162-b959-ce0003c91379"   # RISK GOVERNANCE FRAMEWORK pp.38-41
      - "aca7bba1-7580-4fc1-af22-ad0f36daed33"   # MD&A pp.141-168
    expected_keywords:
      - NPA
      - credit
      - gross
    notes: >
      A valid cross-section comparison on NPAs must mention NPA explicitly,
      discuss credit quality, and use the standard qualifier 'gross' (GNPA).
      'risk' removed — too generic given the question already scopes to NPA.

  - id: gq010
    query_type: CROSS_SECTION_COMPARE
    question: "How does the Risk Governance section compare with the MD&A in describing capital adequacy?"
    section_ids:
      - "bc1911d6-a855-4162-b959-ce0003c91379"   # RISK GOVERNANCE FRAMEWORK pp.38-41
      - "aca7bba1-7580-4fc1-af22-ad0f36daed33"   # MD&A pp.141-168
    expected_keywords:
      - capital
      - adequacy
      - ratio
    notes: >
      Capital adequacy discussions always reference a ratio (CRAR / CAR).
      'ratio' replaces 'risk' — more specific and discriminating for this
      topic.

  - id: gq011
    query_type: CROSS_SECTION_COMPARE
    question: "Compare ICICI Bank's retail banking strategy as described in the MD&A versus the business model section."
    section_ids:
      - "aca7bba1-7580-4fc1-af22-ad0f36daed33"   # MD&A pp.141-168
      - "04d5dd7e-9f0c-4c90-83f5-3ffead40c925"   # BUSINESS MODEL pp.13-18
    expected_keywords:
      - retail
      - customer
      - loan
    notes: >
      A meaningful retail banking comparison must discuss retail lending (loan),
      customer orientation, and explicitly label it as retail. 'banking'
      removed (too broad and present in any banking document response).

  # ─────────────────────────────────────────────────────────────────
  # EXTRACT_ENTITIES — 2 questions
  # Output format: "## Extracted Entities\n- **Name**: value — desc [p.N]"
  # Keywords should test extracted content, not the section header.
  # ─────────────────────────────────────────────────────────────────
  - id: gq012
    query_type: EXTRACT_ENTITIES
    question: "Extract all key financial metrics mentioned in the report with their exact values."
    expected_keywords:
      - profit
      - income
      - crore
    notes: >
      ICICI Bank reports all figures in Indian Rupees crores (₹ crore). Any
      genuine extraction of financial metrics must mention crore, profit (net
      profit), and income (net interest income or total income).

  - id: gq013
    query_type: EXTRACT_ENTITIES
    question: "Extract the key performance metrics and financial ratios from the annual report."
    expected_keywords:
      - NPA
      - profit
      - ratio
    notes: >
      KPI extraction must include asset quality (NPA), profitability (profit),
      and at least one ratio (NPA ratio, ROE, ROA, NIM). 'ratio' is a
      discriminating keyword that distinguishes real KPI extraction from a
      generic summary.

  # ─────────────────────────────────────────────────────────────────
  # EXTRACT_RISKS — 2 questions
  # ─────────────────────────────────────────────────────────────────
  - id: gq014
    query_type: EXTRACT_RISKS
    question: "What are the top risk factors disclosed by ICICI Bank in this annual report?"
    expected_keywords:
      - credit
      - risk
      - operational
    notes: >
      The three canonical risk categories for a bank are credit, market, and
      operational risk. A valid risk extraction MUST surface at least credit and
      operational risk. 'security' removed — too narrow and only covers
      one sub-category of operational risk.

  - id: gq015
    query_type: EXTRACT_RISKS
    question: "Extract all operational and technology risks mentioned in the report."
    expected_keywords:
      - operational
      - risk
      - cyber
    notes: >
      'cyber' (substring of cybersecurity) and 'operational' are the two
      primary risk categories named in the question. 'technology' replaced by
      'cyber' — the report uses 'cybersecurity risk' not 'technology risk' as
      a standalone term. 'cyber' catches 'cybersecurity', 'cyber risk', etc.

  # ─────────────────────────────────────────────────────────────────
  # EXTRACT_DECISIONS — 2 questions
  # Output format: "## Extracted Decisions\n- **Name**: value — desc"
  # Keywords test extracted content, not the markdown section header.
  # ─────────────────────────────────────────────────────────────────
  - id: gq016
    query_type: EXTRACT_DECISIONS
    question: "What major strategic decisions or commitments did ICICI Bank announce?"
    expected_keywords:
      - capital
      - strategic
    notes: >
      Strategic decision extraction from an annual report must surface capital
      decisions (capital allocation, capital adequacy commitments) and
      explicitly label items as strategic. 'Extracted Decisions' removed —
      that is a format header, not a content indicator.

  - id: gq017
    query_type: EXTRACT_DECISIONS
    question: "What capital allocation and investment decisions were made by ICICI Bank?"
    expected_keywords:
      - capital
      - investment
    notes: >
      Capital allocation answers must explicitly mention capital (allocation,
      adequacy, or expenditure) and investment (in subsidiaries, technology,
      or branches). 'Extracted Decisions' removed as a format artifact.

  # ─────────────────────────────────────────────────────────────────
  # DETECT_CONTRADICTIONS — 3 questions
  # Output paths:
  #   (a) No DuckDB candidates  → "No potential contradictions found..."
  #   (b) Candidates, no genuine → "## Contradiction Analysis\n\nReviewed N..."
  #   (c) Genuine contradictions → detailed markdown with claims A/B
  # 'contradiction' (lowercase) is a reliable substring across all three paths.
  # Keywords must test content relevance, not format headers.
  # ─────────────────────────────────────────────────────────────────
  - id: gq018
    query_type: DETECT_CONTRADICTIONS
    question: "Are there any contradictions or inconsistencies in the NPA figures reported across different sections?"
    expected_keywords:
      - contradiction
      - NPA
    notes: >
      'contradiction' appears in all response paths (present in 'contradictions',
      'Contradiction Analysis', 'No genuine contradictions found'). 'NPA' tests
      that the answer is actually about NPA figures, not a generic contradiction
      response. 'Contradiction Analysis' removed — it is a heading artifact
      that only appears when DuckDB returns candidates.

  - id: gq019
    query_type: DETECT_CONTRADICTIONS
    question: "Do the stated capital adequacy ratios match consistently across all sections of the report?"
    expected_keywords:
      - capital
      - adequacy
      - contradiction
    notes: >
      The answer must demonstrate the analysis was about capital adequacy
      specifically (capital + adequacy) and that contradiction detection ran
      (contradiction). 'Contradiction Analysis' removed as a format artifact.

  - id: gq020
    query_type: DETECT_CONTRADICTIONS
    question: "Are there any contradictions in the financial metrics reported in different parts of the report?"
    expected_keywords:
      - contradiction
      - financial
    notes: >
      'contradiction' verifies the detection logic ran; 'financial' verifies
      the answer is topically relevant to financial metrics. 'reviewed' removed —
      it is an implementation detail that only appears when DuckDB returns
      candidates, creating false negatives when no candidates exist.
