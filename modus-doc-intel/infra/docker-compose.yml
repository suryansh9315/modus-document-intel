services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      MONGO_URI: ${MONGO_URI}           # Atlas connection string from .env
      DUCKDB_PATH: /data/modus.duckdb
      UPLOAD_DIR: /data/uploads
    volumes:
      - app_data:/data

volumes:
  app_data:
